name: Refresh aggregate JSONs

on:
  # Every Monday at 8am UTC (midnight PT)
  schedule:
    - cron: '0 8 * * 1'
  # Re-run on push to source CSVs
  push:
    paths:
      - 'data-source/**'
      - 'pipelines/refresh_aggregates.py'
      - '.github/workflows/refresh-aggregates.yml'
  # Manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run aggregate-refresh pipeline
        run: python pipelines/refresh_aggregates.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/settlement_funnel.json data/chain_signatures.json data/candidate_mismatches.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh aggregate JSONs (settlement_funnel, chain_signatures, candidate_mismatches)"
            git push
          fi
