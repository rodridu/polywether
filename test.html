<!DOCTYPE html>
<html>
<head><title>Data Test</title></head>
<body>
<h2>Data.js Test</h2>
<pre id="output">Loading...</pre>
<script src="js/data.js?v=20260217"></script>
<script>
var el = document.getElementById('output');
if (typeof ORACLE_DATA === 'undefined') {
    el.textContent = 'ORACLE_DATA is UNDEFINED - data.js failed to load';
} else {
    var keys = Object.keys(ORACLE_DATA);
    el.textContent = 'ORACLE_DATA loaded with ' + keys.length + ' keys:\n' + keys.join('\n');

    // Test each file the dashboard needs
    var needed = [
        'headline_statistics.json',
        'paper_statistics.json',
        'managed_proposer_did_results.json',
        'microstructure_did.json',
        'dispute_profitability_model.json',
        'bond_distribution.json',
        'bond_calibration.json',
        'dvm_vote_analysis.json',
        'regressions.json',
        'coverage_analysis.json'
    ];
    el.textContent += '\n\n--- Access test ---\n';
    needed.forEach(function(f) {
        var val = ORACLE_DATA[f];
        el.textContent += f + ': ' + (val ? 'OK (' + typeof val + ')' : 'MISSING') + '\n';
    });
}
</script>
</body>
</html>
